# Alembic 配置(drama-smith)
# 运行:`cd backend && uv run alembic <command>`
# DSN 不在此写死,由 env.py 从 Settings(DS_DATABASE_URL)注入,保持单一来源。

[alembic]
# 迁移脚本位于包内(src layout);prepend_sys_path 把 <backend>/src 纳入 sys.path。
script_location = src/drama_smith/migrations
prepend_sys_path = src
version_path_separator = os
# 迁移文件命名:<rev>_<slug>.py,入 git(见 database.md §8)。
file_template = %%(rev)s_%%(slug)s
# 占位;env.py 运行时用 Settings 覆盖。
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
